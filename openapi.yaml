openapi: 3.1.0
info:
  title: ManageLM
  description: >
    Manage Linux servers through the ManageLM portal API.
    Run tasks, check agent status, trigger security audits and inventory scans,
    and manage groups and skills — all via natural language instructions.
  version: 1.0.1
  contact:
    name: ManageLM
    url: https://www.managelm.com

servers:
  # Self-hosted users: replace this URL with your own portal address.
  - url: https://app.managelm.com/api
    description: ManageLM SaaS

components:
  schemas:
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostname:
          type: string
        display_name:
          type: string
          nullable: true
        status:
          type: string
          enum: [online, offline, pending]
        agent_version:
          type: string
          nullable: true
        os_info:
          type: object
          nullable: true
          properties:
            distro:
              type: string
            version:
              type: string
            kernel:
              type: string
            arch:
              type: string
        ip_address:
          type: string
          nullable: true
        is_public:
          type: boolean
        tags:
          type: array
          items:
            type: string
          nullable: true
        health_metrics:
          type: object
          nullable: true
          description: "CPU, memory, disk usage, load average, uptime"
          properties:
            cpu_percent:
              type: number
            memory_percent:
              type: number
            disk_percent:
              type: number
            load_avg:
              type: number
        skill_names:
          type: array
          items:
            type: string
          description: Slugs of skills assigned to this agent
        groups:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        skill_slug:
          type: string
        operation:
          type: string
        status:
          type: string
          enum: [sent, running, completed, failed, timeout, needs_input, answered]
        error_message:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        question:
          type: string
          nullable: true
          description: Question from the agent when status is needs_input
        mutating:
          type: boolean
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    SecurityFinding:
      type: object
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, pass]
        category:
          type: string
        title:
          type: string
        explanation:
          type: string
        remediation:
          type: string

    InventoryItem:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [running, stopped, installed, info]
        version:
          type: string
        details:
          type: string

    Skill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string

    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        agent_count:
          type: integer
        agents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              hostname:
                type: string
              display_name:
                type: string
                nullable: true
        skills:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              slug:
                type: string
              name:
                type: string

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  # ── Agents ───────────────────────────────────────────────────────────

  /agents:
    get:
      operationId: listAgents
      summary: List all agents
      description: >
        Returns all servers (agents) visible to the API key.
        Includes status, health metrics, OS info, assigned skills, and groups.
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"

  /agents/{agentId}:
    get:
      operationId: getAgent
      summary: Get agent details
      description: Returns detailed information for a single agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agents/{agentId}/approve:
    post:
      operationId: approveAgent
      summary: Approve a pending agent
      description: Approve an agent that has enrolled and is waiting for approval.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agent approved
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agents/stats:
    get:
      operationId: getDashboardStats
      summary: Get dashboard statistics
      description: >
        Returns aggregate stats: total agents, online/offline counts,
        task counts, and other account-wide metrics.
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: object
                    properties:
                      total:
                        type: integer
                      online:
                        type: integer
                      offline:
                        type: integer
                      pending:
                        type: integer
                  tasks:
                    type: object
                    properties:
                      total:
                        type: integer
                      completed:
                        type: integer
                      failed:
                        type: integer
                      last_24h:
                        type: integer
                  top_agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        tasks:
                          type: integer

  # ── Tasks ────────────────────────────────────────────────────────────

  /tasks:
    post:
      operationId: submitTask
      summary: Run a task on an agent
      description: >
        Submit a natural-language instruction to an agent. The agent executes
        it using the specified skill. Add ?wait=true to block until the result
        is ready (recommended). Without it, you get a task_id for polling.
      parameters:
        - name: wait
          in: query
          description: Block until the task completes (recommended)
          schema:
            type: string
            enum: ["true"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, skill_slug, instruction]
              properties:
                agent_id:
                  type: string
                  format: uuid
                  description: ID of the target agent
                skill_slug:
                  type: string
                  description: >
                    Skill to use (e.g. "base", "packages", "services",
                    "security", "network", "users", "system")
                instruction:
                  type: string
                  description: Natural-language instruction for the agent
      responses:
        "200":
          description: Task completed (when wait=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
                  result:
                    description: The task output from the agent
        "202":
          description: Task submitted (async mode)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "429":
          description: Daily request limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: listTasks
      summary: List recent tasks
      description: >
        Returns recent tasks with optional filtering by agent and status.
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [sent, running, completed, failed, timeout, needs_input, answered]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get task status and result
      description: >
        Check the status of a task. Use this to poll for results when
        submitting tasks without wait=true.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tasks/{taskId}/answer:
    post:
      operationId: answerTask
      summary: Answer an interactive task question
      description: >
        When a task returns status needs_input, the agent is waiting for user
        input (e.g. domain name, password, configuration choice). Use this
        endpoint to provide the answer and resume the task. Supports wait=true
        to block until the resumed task completes.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: wait
          in: query
          description: Block until the follow-up task completes
          schema:
            type: string
            enum: ["true"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer:
                  type: string
                  description: Answer to the question asked by the agent
      responses:
        "200":
          description: Follow-up task completed (when wait=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
                  result:
                    description: The task output from the agent
        "202":
          description: Follow-up task submitted (async mode)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  previous_task_id:
                    type: string
                    format: uuid
        "409":
          description: Task is not in needs_input state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Session expired (context no longer available)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Security Audits ──────────────────────────────────────────────────

  /security/{agentId}:
    post:
      operationId: startSecurityAudit
      summary: Start a security audit
      description: >
        Trigger a security audit on an agent. Returns immediately with
        audit_id. Use GET to poll for results.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Audit started
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "409":
          description: Audit already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getSecurityAudit
      summary: Get security audit results
      description: >
        Returns the status and findings of the most recent security audit
        for an agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Audit status and findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit:
                    type: object
                    nullable: true
                    properties:
                      status:
                        type: string
                        enum: [running, completed, failed]
                      report:
                        type: array
                        items:
                          $ref: "#/components/schemas/SecurityFinding"
                      started_at:
                        type: string
                        format: date-time
                      completed_at:
                        type: string
                        format: date-time
                        nullable: true

  # ── Inventory ────────────────────────────────────────────────────────

  /inventory/{agentId}:
    post:
      operationId: startInventoryScan
      summary: Start an inventory scan
      description: >
        Trigger a system inventory scan on an agent. Discovers installed
        packages, running services, containers, and system components.
        Returns immediately; use GET to poll for results.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Inventory scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  inventory_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "409":
          description: Scan already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getInventory
      summary: Get inventory scan results
      description: >
        Returns the status and discovered components from the most recent
        inventory scan for an agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Inventory status and items
          content:
            application/json:
              schema:
                type: object
                properties:
                  inventory:
                    type: object
                    nullable: true
                    properties:
                      status:
                        type: string
                        enum: [running, completed, failed]
                      report:
                        type: array
                        items:
                          $ref: "#/components/schemas/InventoryItem"
                      started_at:
                        type: string
                        format: date-time
                      completed_at:
                        type: string
                        format: date-time
                        nullable: true

  # ── SSH & Sudo Access ────────────────────────────────────────────────

  /sshkeys/{agentId}:
    post:
      operationId: startAccessScan
      summary: Start an SSH & sudo access scan
      description: >
        Trigger an SSH & sudo access scan on an agent. Discovers all
        authorized_keys files and sudoers rules for every system user.
        Returns immediately; use GET to poll for results.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Access scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "409":
          description: Scan already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getAccessScan
      summary: Get SSH & sudo access scan results
      description: >
        Returns the status and discovered SSH keys + sudo rules from the
        most recent access scan for an agent. SSH key fingerprints are
        matched against ManageLM user profiles for identity mapping.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Access scan status and results
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan:
                    type: object
                    nullable: true
                    properties:
                      status:
                        type: string
                        enum: [running, completed, failed]
                      report:
                        type: array
                        description: System users with SSH keys and sudo rules
                        items:
                          type: object
                          properties:
                            username:
                              type: string
                            keys:
                              type: array
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                  fingerprint:
                                    type: string
                                  managelm_user:
                                    type: object
                                    nullable: true
                                    properties:
                                      name:
                                        type: string
                                      email:
                                        type: string
                            sudo_rules:
                              type: array
                              items:
                                type: object
                                properties:
                                  runas:
                                    type: string
                                  commands:
                                    type: array
                                    items:
                                      type: string
                                  nopasswd:
                                    type: boolean
                                  via_group:
                                    type: string
                                    nullable: true
                      started_at:
                        type: string
                        format: date-time
                      completed_at:
                        type: string
                        format: date-time
                        nullable: true

  # ── Search ──────────────────────────────────────────────────────────

  /search/agents:
    get:
      operationId: searchAgents
      summary: Search and filter agents
      description: >
        Search agents by health metrics, OS, status, group, or free text.
        Find servers with high CPU/memory/disk usage, specific OS versions,
        or matching tags — without dispatching any commands.
      parameters:
        - name: query
          in: query
          description: Free-text search on hostname, display_name, os_info, ip_address, or tags
          schema:
            type: string
        - name: status
          in: query
          description: "Filter by status: online, offline, approved, pending_approval"
          schema:
            type: string
        - name: group
          in: query
          description: Filter by server group name
          schema:
            type: string
        - name: cpu_above
          in: query
          description: Only agents with CPU usage above this percentage
          schema:
            type: number
        - name: memory_above
          in: query
          description: Only agents with memory usage above this percentage
          schema:
            type: number
        - name: disk_above
          in: query
          description: Only agents with disk usage above this percentage
          schema:
            type: number
      responses:
        "200":
          description: Matching agents
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"

  /search/inventory:
    get:
      operationId: searchInventory
      summary: Search system inventory across agents
      description: >
        Find which servers run a specific service, have a package installed,
        or run containers. Queries the latest inventory scan reports — no
        commands dispatched.
      parameters:
        - name: query
          in: query
          description: "Free-text search on item name, version, or details (e.g. mysql, nginx, docker)"
          schema:
            type: string
        - name: category
          in: query
          description: "Filter by category: service, package, container, network, storage, hardware, user, config, other"
          schema:
            type: string
        - name: status
          in: query
          description: "Filter by status: running, stopped, installed, info"
          schema:
            type: string
        - name: group
          in: query
          description: Filter by server group name
          schema:
            type: string
      responses:
        "200":
          description: Matching inventory items
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        hostname:
                          type: string
                        display_name:
                          type: string
                          nullable: true
                        item_name:
                          type: string
                        item_category:
                          type: string
                        item_status:
                          type: string
                        item_version:
                          type: string
                        item_details:
                          type: string

  /search/security:
    get:
      operationId: searchSecurity
      summary: Search security audit findings across agents
      description: >
        Find which servers have critical issues, SSH misconfigurations,
        open ports, etc. Queries the latest audit reports — no commands
        dispatched.
      parameters:
        - name: query
          in: query
          description: "Free-text search on finding title or explanation"
          schema:
            type: string
        - name: severity
          in: query
          description: "Minimum severity: critical, high, medium, low (returns this level and above)"
          schema:
            type: string
        - name: category
          in: query
          description: "Filter by category: SSH, Firewall, Cron, TLS, Users, Ports, Kernel, Services, etc."
          schema:
            type: string
        - name: unresolved
          in: query
          description: Only show unresolved findings (default true)
          schema:
            type: string
            enum: ["true", "false"]
        - name: group
          in: query
          description: Filter by server group name
          schema:
            type: string
      responses:
        "200":
          description: Matching security findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  findings:
                    type: array
                    items:
                      type: object
                      properties:
                        hostname:
                          type: string
                        severity:
                          type: string
                        category:
                          type: string
                        title:
                          type: string
                        explanation:
                          type: string
                        remediation:
                          type: string
                        resolved:
                          type: boolean

  /search/ssh-keys:
    get:
      operationId: searchSshKeys
      summary: Search SSH keys across infrastructure
      description: >
        Combines server-side authorized_keys from access scans with
        ManageLM user profile keys. Find who has SSH access where,
        list unknown keys, or get a team member's public key.
      parameters:
        - name: query
          in: query
          description: Search by fingerprint or system username
          schema:
            type: string
        - name: user
          in: query
          description: "Filter by ManageLM user name or email. Use 'me' for yourself."
          schema:
            type: string
        - name: unknown_only
          in: query
          description: Only show SSH keys not matched to any ManageLM user
          schema:
            type: string
            enum: ["true", "false"]
        - name: group
          in: query
          description: Filter by server group name
          schema:
            type: string
      responses:
        "200":
          description: SSH key results
          content:
            application/json:
              schema:
                type: object
                properties:
                  registered_keys:
                    type: array
                    description: Keys registered in ManageLM user profiles
                    items:
                      type: object
                      properties:
                        owner:
                          type: object
                          properties:
                            name:
                              type: string
                            email:
                              type: string
                        key_name:
                          type: string
                        algorithm:
                          type: string
                        fingerprint:
                          type: string
                        public_key:
                          type: string
                  deployed_keys:
                    type: array
                    description: Keys found on servers via access scans
                    items:
                      type: object
                      properties:
                        server:
                          type: string
                        system_user:
                          type: string
                        keys:
                          type: array
                          items:
                            type: object
                            properties:
                              fingerprint:
                                type: string
                              type:
                                type: string
                              owner:
                                type: object
                                nullable: true
                                properties:
                                  name:
                                    type: string
                                  email:
                                    type: string

  /search/sudo-rules:
    get:
      operationId: searchSudoRules
      summary: Search sudo privileges across infrastructure
      description: >
        Find sudo privileges from access scan results. Search by system
        username, ManageLM user, or filter for NOPASSWD rules.
      parameters:
        - name: query
          in: query
          description: Search by system username
          schema:
            type: string
        - name: user
          in: query
          description: "Filter by ManageLM user name or email (matches via SSH key identity). Use 'me' for yourself."
          schema:
            type: string
        - name: nopasswd_only
          in: query
          description: Only show NOPASSWD sudo rules
          schema:
            type: string
            enum: ["true", "false"]
        - name: group
          in: query
          description: Filter by server group name
          schema:
            type: string
      responses:
        "200":
          description: Sudo rule results
          content:
            application/json:
              schema:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        server:
                          type: string
                        system_user:
                          type: string
                        sudo_rules:
                          type: array
                          items:
                            type: object
                            properties:
                              runas:
                                type: string
                              commands:
                                type: array
                                items:
                                  type: string
                              nopasswd:
                                type: boolean
                              via_group:
                                type: string
                                nullable: true

  # ── Task Changes ────────────────────────────────────────────────────

  /tasks/{taskId}/changes:
    get:
      operationId: getTaskChanges
      summary: View file changes made by a task
      description: >
        Returns which files were modified by a task (in /etc/ and other
        tracked directories). Optionally fetches the full unified diff
        from the agent.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: full_diff
          in: query
          description: Fetch full unified diff from agent (requires agent online)
          schema:
            type: string
            enum: ["true"]
      responses:
        "200":
          description: Changeset details
          content:
            application/json:
              schema:
                type: object
                properties:
                  changeset:
                    type: object
                    properties:
                      task_id:
                        type: string
                      hostname:
                        type: string
                      skill:
                        type: string
                      task_summary:
                        type: string
                        nullable: true
                      files_changed:
                        type: array
                        items:
                          type: string
                      changeset_summary:
                        type: string
                        nullable: true
                      reverted:
                        type: object
                        nullable: true
                      diff:
                        type: string
                        nullable: true
        "404":
          description: Task not found or no changes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tasks/{taskId}/revert:
    post:
      operationId: revertTask
      summary: Revert file changes from a task
      description: >
        Revert the file changes made by a specific task. Applies a reverse
        patch from the agent's local git repo. Only works if the agent is
        online and the changeset is within the 30-day retention window.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Revert result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  hostname:
                    type: string
                  output:
                    type: string
        "404":
          description: No changeset found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Already reverted or agent offline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Email ───────────────────────────────────────────────────────────

  /email:
    post:
      operationId: sendEmail
      summary: Send an email to yourself
      description: >
        Send an email to the authenticated user. Use this to deliver
        reports, summaries, or notifications. The body is plain text
        wrapped in the ManageLM email template.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, body]
              properties:
                subject:
                  type: string
                  description: Email subject line
                body:
                  type: string
                  description: Email body in plain text
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  # ── Skills ───────────────────────────────────────────────────────────

  /skills:
    get:
      operationId: listSkills
      summary: List account skills
      description: >
        Returns all skills available in the account. Skills define what
        capabilities agents have (packages, services, security, etc.).
      responses:
        "200":
          description: Skill list
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: "#/components/schemas/Skill"

  /skills/catalog:
    get:
      operationId: listSkillCatalog
      summary: List available skill catalog
      description: >
        Returns pre-built skills available for import. Shows which ones
        are already imported and which have upgrades available.
      responses:
        "200":
          description: Catalog list
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalog:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        imported:
                          type: boolean
                        upgrade_available:
                          type: boolean

  # ── Groups ───────────────────────────────────────────────────────────

  /groups:
    get:
      operationId: listGroups
      summary: List agent groups
      description: >
        Returns all groups with their member agents, users, and assigned
        skills. Groups allow managing skills and access for sets of agents.
      responses:
        "200":
          description: Group list
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"

  # ── Task Follow-up ───────────────────────────────────────────────────

  /tasks/{taskId}/follow-up:
    post:
      operationId: followUpTask
      summary: Continue a conversation on a completed task
      description: >
        Send a follow-up message to continue working with an agent after a
        task completes. Loads prior conversation context from the completed
        task. Context expires after 5 minutes. Supports wait=true.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: wait
          in: query
          description: Block until the follow-up task completes
          schema:
            type: string
            enum: ["true"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instruction]
              properties:
                instruction:
                  type: string
                  description: Follow-up message or question for the agent
      responses:
        "200":
          description: Follow-up task completed (when wait=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
                  result:
                    description: The task output from the agent
        "202":
          description: Follow-up task submitted (async mode)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  previous_task_id:
                    type: string
                    format: uuid
        "410":
          description: Context expired (task completed more than 5 minutes ago)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Pentest ────────────────────────────────────────────────────────

  /pentest/credits:
    get:
      operationId: getPentestCredits
      summary: Get credit balance for pentests
      description: >
        Returns the current credit balance and a URL to purchase more credits.
        Check this before starting a pentest.
      responses:
        "200":
          description: Credit balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  credit_balance:
                    type: number
                  credits_url:
                    type: string
                    description: URL to purchase additional credits

  /pentest/{agentId}:
    post:
      operationId: startPentest
      summary: Start a pentest on an agent
      description: >
        Run security penetration tests on a public agent. Requires an active
        license with sufficient credits. Target URLs must belong to verified
        domains. Returns 202 with a pentest ID.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tests]
              properties:
                tests:
                  type: array
                  items:
                    type: string
                  description: List of test slugs from the catalog
                target_urls:
                  type: array
                  items:
                    type: string
                  description: URLs to test (must be from verified domains)
                scheduled_at:
                  type: string
                  format: date-time
                  description: Schedule for later execution (optional)
      responses:
        "202":
          description: Pentest started
          content:
            application/json:
              schema:
                type: object
                properties:
                  pentest_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [running, scheduled]
        "400":
          description: Bad request (invalid tests, non-public agent, no license)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Unverified domains in target URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Pentest already running on this agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getPentest
      summary: Get pentest status and results
      description: >
        Returns the current pentest for an agent including status, score,
        findings, and compliance rule results.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pentest status and results
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [running, scheduled, completed, failed]
                  tests:
                    type: array
                    items:
                      type: string
                  target_urls:
                    type: array
                    items:
                      type: string
                  score:
                    type: integer
                    nullable: true
                    description: 0-100 security score (only when completed)
                  report:
                    type: object
                    nullable: true
                    description: Findings from the pentest
                  credit_cost:
                    type: integer
                  error_message:
                    type: string
                    nullable: true
                  started_at:
                    type: string
                    format: date-time
                    nullable: true
                  completed_at:
                    type: string
                    format: date-time
                    nullable: true
        "404":
          description: No pentest for this agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Account ──────────────────────────────────────────────────────────

  /account:
    get:
      operationId: getAccount
      summary: Get account info
      description: Returns account details including team members.
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        first_name:
                          type: string
                        last_name:
                          type: string
                        email:
                          type: string
                        account_role:
                          type: string
