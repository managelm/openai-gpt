openapi: 3.1.0
info:
  title: ManageLM
  description: >
    Manage Linux servers through the ManageLM portal API.
    Run tasks, check agent status, trigger security audits and inventory scans,
    and manage groups and skills — all via natural language instructions.
  version: 1.0.0
  contact:
    name: ManageLM
    url: https://www.managelm.com

servers:
  # Self-hosted users: replace this URL with your own portal address.
  - url: https://app.managelm.com/api
    description: ManageLM SaaS

components:
  schemas:
    Agent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hostname:
          type: string
        display_name:
          type: string
          nullable: true
        status:
          type: string
          enum: [online, offline, pending]
        agent_version:
          type: string
          nullable: true
        os_info:
          type: object
          nullable: true
          properties:
            distro:
              type: string
            version:
              type: string
            kernel:
              type: string
            arch:
              type: string
        ip_address:
          type: string
          nullable: true
        is_public:
          type: boolean
        tags:
          type: array
          items:
            type: string
          nullable: true
        health_metrics:
          type: object
          nullable: true
          description: "CPU, memory, disk usage, load average, uptime"
          properties:
            cpu_percent:
              type: number
            memory_percent:
              type: number
            disk_percent:
              type: number
            load_avg:
              type: number
        skill_names:
          type: array
          items:
            type: string
          description: Slugs of skills assigned to this agent
        groups:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
        last_seen_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        skill_slug:
          type: string
        operation:
          type: string
        status:
          type: string
          enum: [sent, running, completed, failed, timeout, needs_input, answered]
        error_message:
          type: string
          nullable: true
        summary:
          type: string
          nullable: true
        question:
          type: string
          nullable: true
          description: Question from the agent when status is needs_input
        mutating:
          type: boolean
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    SecurityFinding:
      type: object
      properties:
        id:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, pass]
        category:
          type: string
        title:
          type: string
        explanation:
          type: string
        remediation:
          type: string

    InventoryItem:
      type: object
      properties:
        id:
          type: string
        category:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [running, stopped, installed, info]
        version:
          type: string
        details:
          type: string

    Skill:
      type: object
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        version:
          type: string

    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        agent_count:
          type: integer
        agents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              hostname:
                type: string
              display_name:
                type: string
                nullable: true
        skills:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              slug:
                type: string
              name:
                type: string

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  # ── Agents ───────────────────────────────────────────────────────────

  /agents:
    get:
      operationId: listAgents
      summary: List all agents
      description: >
        Returns all servers (agents) visible to the API key.
        Includes status, health metrics, OS info, assigned skills, and groups.
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"

  /agents/{agentId}:
    get:
      operationId: getAgent
      summary: Get agent details
      description: Returns detailed information for a single agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agents/{agentId}/approve:
    post:
      operationId: approveAgent
      summary: Approve a pending agent
      description: Approve an agent that has enrolled and is waiting for approval.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agent approved
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /agents/stats:
    get:
      operationId: getDashboardStats
      summary: Get dashboard statistics
      description: >
        Returns aggregate stats: total agents, online/offline counts,
        task counts, and other account-wide metrics.
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: object
                    properties:
                      total:
                        type: integer
                      online:
                        type: integer
                      offline:
                        type: integer
                      pending:
                        type: integer
                  tasks:
                    type: object
                    properties:
                      total:
                        type: integer
                      completed:
                        type: integer
                      failed:
                        type: integer
                      last_24h:
                        type: integer
                  top_agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        tasks:
                          type: integer

  # ── Tasks ────────────────────────────────────────────────────────────

  /tasks:
    post:
      operationId: submitTask
      summary: Run a task on an agent
      description: >
        Submit a natural-language instruction to an agent. The agent executes
        it using the specified skill. Add ?wait=true to block until the result
        is ready (recommended). Without it, you get a task_id for polling.
      parameters:
        - name: wait
          in: query
          description: Block until the task completes (recommended)
          schema:
            type: string
            enum: ["true"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [agent_id, skill_slug, instruction]
              properties:
                agent_id:
                  type: string
                  format: uuid
                  description: ID of the target agent
                skill_slug:
                  type: string
                  description: >
                    Skill to use (e.g. "base", "packages", "services",
                    "security", "network", "users", "system")
                instruction:
                  type: string
                  description: Natural-language instruction for the agent
      responses:
        "200":
          description: Task completed (when wait=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
                  result:
                    description: The task output from the agent
        "202":
          description: Task submitted (async mode)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "429":
          description: Daily request limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: listTasks
      summary: List recent tasks
      description: >
        Returns recent tasks with optional filtering by agent and status.
      parameters:
        - name: agent_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [sent, running, completed, failed, timeout, needs_input, answered]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"

  /tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get task status and result
      description: >
        Check the status of a task. Use this to poll for results when
        submitting tasks without wait=true.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /tasks/{taskId}/answer:
    post:
      operationId: answerTask
      summary: Answer an interactive task question
      description: >
        When a task returns status needs_input, the agent is waiting for user
        input (e.g. domain name, password, configuration choice). Use this
        endpoint to provide the answer and resume the task. Supports wait=true
        to block until the resumed task completes.
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: wait
          in: query
          description: Block until the follow-up task completes
          schema:
            type: string
            enum: ["true"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answer]
              properties:
                answer:
                  type: string
                  description: Answer to the question asked by the agent
      responses:
        "200":
          description: Follow-up task completed (when wait=true)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: "#/components/schemas/Task"
                  result:
                    description: The task output from the agent
        "202":
          description: Follow-up task submitted (async mode)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                  previous_task_id:
                    type: string
                    format: uuid
        "409":
          description: Task is not in needs_input state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Session expired (context no longer available)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Security Audits ──────────────────────────────────────────────────

  /security/{agentId}:
    post:
      operationId: startSecurityAudit
      summary: Start a security audit
      description: >
        Trigger a security audit on an agent. Returns immediately with
        audit_id. Use GET to poll for results.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Audit started
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "409":
          description: Audit already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getSecurityAudit
      summary: Get security audit results
      description: >
        Returns the status and findings of the most recent security audit
        for an agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Audit status and findings
          content:
            application/json:
              schema:
                type: object
                properties:
                  audit:
                    type: object
                    nullable: true
                    properties:
                      status:
                        type: string
                        enum: [running, completed, failed]
                      report:
                        type: array
                        items:
                          $ref: "#/components/schemas/SecurityFinding"
                      started_at:
                        type: string
                        format: date-time
                      completed_at:
                        type: string
                        format: date-time
                        nullable: true

  # ── Inventory ────────────────────────────────────────────────────────

  /inventory/{agentId}:
    post:
      operationId: startInventoryScan
      summary: Start an inventory scan
      description: >
        Trigger a system inventory scan on an agent. Discovers installed
        packages, running services, containers, and system components.
        Returns immediately; use GET to poll for results.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Inventory scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  inventory_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "409":
          description: Scan already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getInventory
      summary: Get inventory scan results
      description: >
        Returns the status and discovered components from the most recent
        inventory scan for an agent.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Inventory status and items
          content:
            application/json:
              schema:
                type: object
                properties:
                  inventory:
                    type: object
                    nullable: true
                    properties:
                      status:
                        type: string
                        enum: [running, completed, failed]
                      report:
                        type: array
                        items:
                          $ref: "#/components/schemas/InventoryItem"
                      started_at:
                        type: string
                        format: date-time
                      completed_at:
                        type: string
                        format: date-time
                        nullable: true

  # ── SSH & Sudo Access ────────────────────────────────────────────────

  /sshkeys/{agentId}:
    post:
      operationId: startAccessScan
      summary: Start an SSH & sudo access scan
      description: >
        Trigger an SSH & sudo access scan on an agent. Discovers all
        authorized_keys files and sudoers rules for every system user.
        Returns immediately; use GET to poll for results.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "202":
          description: Access scan started
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan_id:
                    type: string
                    format: uuid
                  status:
                    type: string
        "409":
          description: Scan already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Agent not online
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: getAccessScan
      summary: Get SSH & sudo access scan results
      description: >
        Returns the status and discovered SSH keys + sudo rules from the
        most recent access scan for an agent. SSH key fingerprints are
        matched against ManageLM user profiles for identity mapping.
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Access scan status and results
          content:
            application/json:
              schema:
                type: object
                properties:
                  scan:
                    type: object
                    nullable: true
                    properties:
                      status:
                        type: string
                        enum: [running, completed, failed]
                      report:
                        type: array
                        description: System users with SSH keys and sudo rules
                        items:
                          type: object
                          properties:
                            username:
                              type: string
                            keys:
                              type: array
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                  fingerprint:
                                    type: string
                                  managelm_user:
                                    type: object
                                    nullable: true
                                    properties:
                                      name:
                                        type: string
                                      email:
                                        type: string
                            sudo_rules:
                              type: array
                              items:
                                type: object
                                properties:
                                  runas:
                                    type: string
                                  commands:
                                    type: array
                                    items:
                                      type: string
                                  nopasswd:
                                    type: boolean
                                  via_group:
                                    type: string
                                    nullable: true
                      started_at:
                        type: string
                        format: date-time
                      completed_at:
                        type: string
                        format: date-time
                        nullable: true

  # ── Skills ───────────────────────────────────────────────────────────

  /skills:
    get:
      operationId: listSkills
      summary: List account skills
      description: >
        Returns all skills available in the account. Skills define what
        capabilities agents have (packages, services, security, etc.).
      responses:
        "200":
          description: Skill list
          content:
            application/json:
              schema:
                type: object
                properties:
                  skills:
                    type: array
                    items:
                      $ref: "#/components/schemas/Skill"

  /skills/catalog:
    get:
      operationId: listSkillCatalog
      summary: List available skill catalog
      description: >
        Returns pre-built skills available for import. Shows which ones
        are already imported and which have upgrades available.
      responses:
        "200":
          description: Catalog list
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalog:
                    type: array
                    items:
                      type: object
                      properties:
                        slug:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        imported:
                          type: boolean
                        upgrade_available:
                          type: boolean

  # ── Groups ───────────────────────────────────────────────────────────

  /groups:
    get:
      operationId: listGroups
      summary: List agent groups
      description: >
        Returns all groups with their member agents, users, and assigned
        skills. Groups allow managing skills and access for sets of agents.
      responses:
        "200":
          description: Group list
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      $ref: "#/components/schemas/Group"

  # ── Account ──────────────────────────────────────────────────────────

  /account:
    get:
      operationId: getAccount
      summary: Get account info
      description: Returns account details including team members.
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                type: object
                properties:
                  account:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      created_at:
                        type: string
                        format: date-time
                  users:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        first_name:
                          type: string
                        last_name:
                          type: string
                        email:
                          type: string
                        account_role:
                          type: string
